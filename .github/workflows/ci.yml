name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Every step runs inside the flake dev shell, so all tooling (Node, pnpm
        # via corepack, web-ext, Playwright browsers, xvfb) is pinned by the flake
        # — no `pnpm dlx` or ad-hoc tool fetches in CI.
        shell: nix develop --command bash -eo pipefail {0}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main

      # Runs `wxt prepare` via the postinstall hook.
      - run: pnpm install --frozen-lockfile

      # Typecheck, formatting, + unit tests (pure logic + DOM transforms against real fixtures).
      - run: pnpm check:types
      - run: pnpm check:formatting
      - run: pnpm test:unit

      # Build all targets. `pnpm build` produces chrome + firefox; Safari builds
      # the payload here as a compile smoke check (Xcode conversion/signing is a
      # documented manual step on macOS).
      - run: pnpm build
      - run: pnpm build:safari

      # Static validation of the Firefox build (web-ext is provided by the flake).
      - run: pnpm check:lint

      # Distributable zips (Chrome store zip + Firefox zip & sources zip).
      - run: pnpm zip

      # E2E: load the built Chromium extension and drive it against the captured
      # fixtures. Browsers come from the flake (PLAYWRIGHT_BROWSERS_PATH); run
      # headed under xvfb so the extension actually loads.
      - run: xvfb-run -a pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extension-builds
          path: apps/extension/.output/*.zip
          if-no-files-found: warn

  deploy-website:
    # Self-contained static site (apps/website) → GitHub Pages, on main only.
    # Pages' Actions deployment can publish any subfolder — no top-level docs/ needed.
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/website
      - id: deployment
        uses: actions/deploy-pages@v4
